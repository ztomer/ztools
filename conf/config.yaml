llm_url: http://localhost:1337
default_model: qwen3.6-35b-a3b-mxfp4

best_models:
  # weekend_planner: qwen3.6 (best - real venue extraction in 2.5min)
  # twitter_summarizer: gemma-4-31b (best summarization)
  # Priority: quality 95%, speed 5% (speed as tie-breaker)
  think: qwen3.6-35b-a3b-mxfp4
  json: qwen3.6-35b-a3b-mxfp4
  detailed_json: qwen3.6-35b-a3b-mxfp4
  summarize: qwen3.6-35b-a3b-mxfp4
  filename: foundation
  vlm: gemma-4-26b-a4b-it-4bit

# Model-specific prompts for summarization task
summarize_prompts:
  # Default prompt (used if model not listed)
  default: "Output the summary. Use ## headers for topics.\n\n<timeline>\n{}\n</timeline>\n\nSummarize the timeline."
  # qwen: needs timeline structure, allows thinking
  qwen3.6: "Output the summary. Use ## headers for topics.\n\n<timeline>\n{}\n</timeline>\n\nSummarize the timeline. Include your analysis."
  # foundation: works with default prompt
  foundation: "Output the summary. Use ## headers for topics.\n\n<timeline>\n{}\n</timeline>\n\nSummarize the timeline."
  # gemma: keeps thinking
  gemma: "Output the summary. Use ## headers for topics.\n\n<timeline>\n{}\n</timeline>\n\nSummarize the timeline."

timeouts:
  think: 600
  json: 600
  detailed_json: 600
  summarize: 300
  filename: 120
  vlm: 600

max_tokens:
  think: 16000
  json: 16000
  detailed_json: 16000
  summarize: 16000
  filename: 1000
  vlm: 16000
