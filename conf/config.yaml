llm_url: http://localhost:1337
default_model: qwen3.6-35b-a3b-mxfp4

best_models:
  think: qwen3.6-35b-a3b-mxfp4
  json: qwen3.6-35b-a3b-mxfp4
  summarize: qwen3.6-35b-a3b-mxfp4
  filename: nemotron-3-nano-omni-30b-a3b-mxfp4  # Fast (7-10s) + best quality
  vlm: gemma-4-26b-a4b-it-4bit

timeouts:
  think: 600
  json: 600
  summarize: 300
  filename: 120
  vlm: 600

max_tokens:
  think: 16000
  json: 16000
  summarize: 16000
  filename: 1000
  vlm: 16000

filename_models:
  - nemotron-3-nano-omni-30b-a3b-mxfp4  # Fast + accurate
  - gemma-4-31b-it-jang_4m  # Slower but good
  - foundation  # Fallback

prompts:
  filename: |
    Output ONLY the filename string (no JSON, no code blocks).
    Use lowercase, underscores for spaces, no special characters.
    Keep it under 50 characters.
    
    TEXT: {text}

eval_inputs:
  filename:
    - "business lessons"  # Simple
    - "scott adams advice"  # Simple
    
  image_filename:
    # Simple cases
    - ["How to manage underperformers", "how_to_manage_underperformers"]
    - ["Scott Adams essays", "scott_adams_essays"]
    
    # Real OCR outputs (from real images - DO NOT DELETE for evals)
    - ["10 powerful sentences by Scott Adams navigating failure, ambition: ...", "scott_adams_powerful_sentences"]
    - ["15 years of business lessons in <500 words: ...", "business_lessons"]
    - ["Be delusional. Believe that you have the ability...", "delusional_belief"]
    - ["How To Prioritize Like A Pro - Noemi Kis: ...", "prioritize_pro"]
    - ["elon musk: how to win at founding - taking risk...", "musk_founding_tips"]
    - ["context engineering template - comprehensive guide...", "context_engineering"]