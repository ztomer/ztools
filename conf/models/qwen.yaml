# Qwen model configuration
# Used for qwen3.6-35b-a3b-mxfp4 and variants

name: qwen
timeout: 120

# Model-specific field mappings (normalize LLM output to our schema)
# Key = what model outputs, Value = what we expect
field_mapping:
  # Fixed activities
  category: target_ages
  context_highlight: price
  type: weather
  # Transient events
  event_date: day
  end_date: end_date

# Task-specific prompts (reused from production scripts)
# Use {location}, {age_range}, {date_range} placeholders for runtime injection
prompts:
  json: |
    Output JSON now. Use EXACT schema.

  # Weekend planner prompts (from weekend_planner.py)
  # Variables: {location}, {age_range}, {date_range}
  weekend_fixed: |
    Output JSON now. Use EXACT schema: {{"fixed_activities": [{{"name": "str", "location": "str", "target_ages": "str", "price": "str", "weather": "str"}}]}}

    Extract 8-10 popular {location} venues for families with kids ages {age_range}.

    CRITICAL: Each item MUST have these exact fields:
    - target_ages: "{age_range}" (NOT category, NOT type)
    - price: "$18-35 per child" or "$25-35 per family" (NOT context_highlight, NOT description)
    - weather: "indoor" or "outdoor" (NOT setting, NOT category)
    - name: official name (NOT description)
    - location: city/neighborhood only (NOT full address)

    EXCLUDE these places: {exclusions}

    Output ONLY JSON. No extra text.

  # Variables: {location}, {age_range}, {date_range}
  weekend_transient: |
    Output JSON now. Schema: {{"transient_events": [{{"name": "str", "location": "str", "target_ages": "str", "price": "str", "duration": "str", "weather": "str", "day": "str"}}]}}

    Find 5-10 events for {date_range} in {location}. Kids ages {age_range}.

    Use ONLY these values:
    - day: Friday, Saturday, or Sunday
    - target_ages: "{age_range}"
    - price: "$20-30 per child" or "free"
    - duration: "2-3 hours" or "all day"
    - weather: "indoor" or "outdoor"

    Output ONLY JSON array inside the object. No thinking.

  # Twitter summarizer prompt (from twitter_summarizer.py)
  # Variables: {} for timeline
  summarize: |
    Output the summary in bullet points. Use ## headers for topics.

    <timeline>
    {}
    </timeline>

    Summarize the timeline. Use bullet points for facts.

  # Image renamer prompt (from image_renamer.py)
  # Variables: {} for text input
  filename: |
    Output JSON now.
    You are a file naming assistant. Read the following text and suggest a short, descriptive filename.
    Output ONLY the filename string (no quotes, no JSON, no code blocks).
    
    TEXT: {}

  # File summary prompt (no inference from filename)
  file_summary: |
    Output JSON now. Schema: {"filepath": "summary", ...}
    CRITICAL: Describe what each file DOES, not its filename extension.
    - Bad: "a python script" (infers from .py)
    - Good: "parses web content and extracts metadata"
    
    {}

# Key normalizations (output -> our schema)
key_mappings:
  event: name
  title: name
  activity: name
  venue: location
  address: location
  place: location
  age_group: target_ages
  ages: target_ages
  age_range: target_ages
  cost: price
  pricing: price
  fee: price
  type: weather
  category: weather

# Model quirks
quirks:
  - type: prefix
    pattern: "Output JSON now."
    reason: Prevents thinking blocks in JSON output

# Top-level keys for extraction (in priority order)
top_keys:
  fixed:
    - fixed_activities
    - year_round_fixed_activities
    - venues
    - places
    - activities
    - items
  transient:
    - transient_events
    - events
    - activities
    - recommendations