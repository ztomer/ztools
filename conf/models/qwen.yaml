# Qwen model configuration
# Used for qwen3.6-35b-a3b-mxfp4 and variants

name: qwen
timeout: 120

# Task-specific prompts
prompts:
  json: |
    Output JSON now. Use EXACT schema.

  detailed_json: |
    Output JSON now.

  summarize: |
    Output the summary. Use ## headers for topics.

    <timeline>
    {}
    </timeline>

    Summarize the timeline. Include your analysis.

  filename: |
    Generate a short filename.

  # Eval prompts
  weekend_fixed: |
    Extract JSON from context. 10 items with name, location, target_ages, price, weather.

    Default values if not in context:
    - target_ages: "6-13 years"
    - price: $20-30 or Free
    - weather: "indoor"

  weekend_transient: |
    Extract JSON from context. 10 items with name, location, target_ages, price, duration, weather, day.

    Default values if not in context:
    - target_ages: "6-13 years"
    - price: $20-30 or Free
    - duration: "2-3 hours"
    - weather: "indoor"
    - day: Friday/Saturday/Sunday

# Key normalizations (output -> our schema)
key_mappings:
  event: name
  title: activity
  venue: location
  address: location
  age_group: target_ages
  ages: target_ages
  cost: price
  pricing: price
  type: weather

# Model quirks
quirks:
  - type: prefix
    pattern: "Output JSON now."
    reason: Prevents thinking blocks in JSON output
