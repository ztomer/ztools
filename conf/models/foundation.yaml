# Foundation model configuration
# Default/fallback model

name: foundation
timeout: 60

# Task-specific prompts (reused from production scripts)
# Use {location}, {age_range}, {date_range} placeholders for runtime injection
prompts:
  json: |
    Output JSON now. Use EXACT schema.

  # Weekend planner prompts (from weekend_planner.py)
  # Variables: {location}, {age_range}, {date_range}
  weekend_fixed: |
    Output JSON now. CRITICAL: Use EXACT schema with ALL these fields:
    {"fixed_activities": [{"name": "str", "location": "str", "target_ages": "str", "price": "str", "weather": "str"}]}
    
    Extract EXACTLY 8-10 popular {location} venues for families with kids ages {age_range}.
    You MUST output a JSON ARRAY with 8-10 items.
    
    REQUIRED fields for EACH item:
    - target_ages: "{age_range}"
    - price: "$18-35 per child" or "free"
    - weather: "indoor" or "outdoor"
    - name: official venue name
    - location: city/neighborhood only
    
    Output ONLY JSON array. No extra text.

  # Variables: {location}, {age_range}, {date_range}
  weekend_transient: |
    Output JSON now. CRITICAL: Use EXACT year 2026.
    
    Use EXACT schema: [{"name": "str", "location": "str", "target_ages": "str", "price": "str", "weather": "str", "day": "str", "duration": "str"}]
    
    Extract 8-10 {date_range} events in {location} for kids {age_range}.
    
    REQUIRED fields for EACH item:
    - name: event name
    - location: city/neighborhood
    - target_ages: "{age_range}"
    - price: "$20-30" or "free"
    - weather: "indoor" or "outdoor"
    - day: Friday, Saturday, or Sunday
    - duration: "2-3 hours" or "all day"
    
    Output ONLY JSON array. No markdown, no extra text.

  # Twitter summarizer prompt (from twitter_summarizer.py)
  # Variables: {} for timeline
  summarize: |
    Output the summary in bullet points. Use ## headers for topics.

    <timeline>
    {}
    </timeline>

    Summarize the timeline. Use bullet points for facts.

  # Image renamer prompt (from image_renamer.py)
  # Variables: {} for text input
  filename: |
    Output JSON now. Schema: {"filename": "str"}
    You are a file naming assistant.
    Use lowercase, underscores for spaces, no special characters.
    Keep it under 50 characters.
    Output ONLY JSON. No extra text.

    TEXT: {}

  # File summary (describe what files DO, not extension)
  file_summary: |
    Output JSON now. Schema: {"filepath": "summary", ...}
    CRITICAL: Describe what each file DOES, not its filename extension.
    - Bad: "a python script" (infers from .py)
    - Good: "parses web content and extracts metadata"
    
    Files to summarize:
    {}

# Key normalizations (output -> our schema)
key_mappings:
  event: name
  title: name
  activity: name
  venue: location
  address: location
  place: location
  age_group: target_ages
  ages: target_ages
  age_range: target_ages
  cost: price
  pricing: price
  fee: price
  type: weather
  category: weather

# Model quirks
quirks: []