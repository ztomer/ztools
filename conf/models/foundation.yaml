# Foundation model configuration

name: foundation
timeout: 60

# Task-specific prompts
prompts:
  json: |
    Output JSON.

  detailed_json: |
    Output JSON.

  summarize: |
    Output the summary. Use ## headers for topics.

    <timeline>
    {}
    </timeline>

    Summarize the timeline.

  filename: |
    Output filename.

  weekend_fixed: |
    Output JSON with name, location, target_ages, price, weather.

  weekend_transient: |
    Output JSON with name, location, target_ages, price, duration, weather, day.

# Key normalizations
key_mappings: {}

# No special quirks needed
quirks: []
