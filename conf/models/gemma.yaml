# Gemma model configuration
# Used for gemma-4-26b-a4b-it-4bit and variants

name: gemma
timeout: 120

# Task-specific prompts (reused from production scripts)
prompts:
  json: |
    Output JSON now. Use EXACT schema.

  # Weekend planner prompts (from weekend_planner.py)
  weekend_fixed: |
    Output JSON now. Use EXACT schema: {{"fixed_activities": [{{"name": "str", "location": "str", "target_ages": "str", "price": "str", "weather": "str"}}]}}

    Extract popular Toronto/Vaughan venues for families with kids ages 4-12.
    Include location (city only), target_ages, price in CAD, weather.

    MANDATORY default values:
    - target_ages: "6-13 years"
    - price: $18-35 per child or free
    - weather: "indoor"

    Never leave any field empty.

  weekend_transient: |
    Output JSON now. Use EXACT schema: {{"transient_events": [{{"name": "str", "location": "str", "target_ages": "str", "price": "str", "duration": "str", "weather": "str", "day": "str"}}]}}

    Extract Toronto/Vaughan family events for April 2026.

    MANDATORY default values:
    - target_ages: "6-13 years"
    - price: $20-30 per child or free
    - duration: "2-3 hours"
    - weather: "indoor"
    - day: Friday/Saturday/Sunday

    Never leave any field empty.

  # Twitter summarizer prompt (from twitter_summarizer.py)
  summarize: |
    Output the summary. Use ## headers for topics.

    <timeline>
    {}
    </timeline>

    Summarize the timeline. Include your analysis.

  # Image renamer prompt (from image_renamer.py)
  filename: |
    You are a file naming assistant. Read the following text and suggest a short, descriptive filename (without extension).
    Use lowercase, underscores for spaces, no special characters.
    Keep it under 50 characters.
    Output ONLY the filename string, nothing else.

    TEXT: {}

# Key normalizations (output -> our schema)
key_mappings:
  event: name
  title: name
  activity: name
  venue: location
  address: location
  place: location
  age_group: target_ages
  ages: target_ages
  age_range: target_ages
  cost: price
  pricing: price
  fee: price
  type: weather
  category: weather

# Model quirks
quirks:
  - type: prefix
    pattern: "Output JSON now."
    reason: Prevents thinking blocks in JSON output