# Gemma model configuration
# Used for gemma-4-26b-a4b-it-4bit and variants

name: gemma
timeout: 120

# Model-specific field mappings (normalize LLM output to our schema)
field_mapping:
  activity: name
  event_name: name
  venue: location

# Task-specific prompts (reused from production scripts)
# Use {location}, {age_range}, {date_range} placeholders for runtime injection
prompts:
  json: |
    Output JSON now. Use EXACT schema.

  # Weekend planner prompts (from weekend_planner.py)
  # Variables: {location}, {age_range}, {date_range}
  weekend_fixed: |
    Output JSON now. Use EXACT schema: {{"fixed_activities": [{{"name": "str", "location": "str", "target_ages": "str", "price": "str", "weather": "str"}}]}}

    Extract EXACTLY 8-10 popular {location} venues for families with kids ages {age_range}.
    You MUST output a JSON ARRAY with 8-10 items, not a single object.
    
    Include location (city only), target_ages, price in CAD, weather.

    MANDATORY default values:
    - target_ages: "{age_range}"
    - price: $18-35 per child or free
    - weather: "indoor"

    CRITICAL: Output an ARRAY of 8-10 items. Do not output a single object.

  # Variables: {location}, {age_range}, {date_range}
  weekend_transient: |
    Output JSON now. NO explanations, NO preamble, NO markdown. ONLY valid JSON array.
    
    CRITICAL: Use EXACT year 2026. NOT 2626 or 26.
    
    Required schema: [{"name": "...", "location": "...", "target_ages": "...", "price": "...", "weather": "...", "day": "..."}]
    
    Extract 8-10 {date_range} events in {location} for kids {age_range}.
    Output ONLY array with 8-10 items. No wrapper object.
    No markdown, no text before or after JSON. No "Based on" or "Note:" text.

  # Twitter summarizer prompt (from twitter_summarizer.py)
  # Variables: {} for timeline
  summarize: |
    Output the summary. Use ## headers for topics.

    <timeline>
    {}
    </timeline>

    Summarize the timeline. Include your analysis.

  # Image renamer prompt (from image_renamer.py)
  # Variables: {} for text input
  filename: |
    You are a file naming assistant. Read the following text and suggest a short, descriptive filename (without extension).
    Use lowercase, underscores for spaces, no special characters.
    Keep it under 50 characters.
    Output ONLY the filename string, nothing else.

    TEXT: {}

# Key normalizations (output -> our schema)
key_mappings:
  event: name
  title: name
  activity: name
  venue: location
  address: location
  place: location
  age_group: target_ages
  ages: target_ages
  age_range: target_ages
  cost: price
  pricing: price
  fee: price
  type: weather
  category: weather

# Top-level keys for extraction (in priority order)
top_keys:
  fixed:
    - fixed_activities
    - year_round_fixed_activities
    - weekend_data
    - target_weekend
    - venues
    - places
    - activities
    - items
  transient:
    - transient_events
    - events
    - weekend_data
    - target_weekend
    - activities
    - recommendations

# Model quirks
quirks:
  - type: prefix
    pattern: "Output JSON now."
    reason: Prevents thinking blocks in JSON output
  - type: transform
    name: gemma_weekend_forecast
    description: Transform gemma's weekend_forecast structure to events list
    when: gemma returns weekend_forecast object with nested day objects