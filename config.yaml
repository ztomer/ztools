# ZTools Configuration
# OVERRIDE the hardcoded defaults in osaurus_lib.py

llm_url: http://localhost:1337
default_model: gemma-4-26b-a4b-it-4bit

# Best models per task type
# Based on eval:
#   qwen3.6 gets 100% on 3/5 tasks with short prompts
#   qwen3.5 gets 100% but takes longer
best_models:
  think: qwen3.6-35b-a3b-mxfp4
  json: qwen3.6-35b-a3b-mxfp4
  summarize: qwen3.6-35b-a3b-mxfp4
  filename: qwen3.6-35b-a3b-mxfp4
  vlm: qwen3.6-35b-a3b-mxfp4

